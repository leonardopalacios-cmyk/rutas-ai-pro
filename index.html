<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚀 RUTAS AI PRO - LOGISTICS EDITION</title>
    <style>
        :root {
            --primary: #00d4ff;
            --secondary: #7000ff;
            --accent: #2ecc71;
            --danger: #e94560;
            --bg: #05050a;
            --card-bg: rgba(255, 255, 255, 0.05);
            --text: #ffffff;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        .sidebar {
            width: 400px; background: rgba(10, 10, 25, 0.9); backdrop-filter: blur(15px);
            padding: 25px; border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; flex-direction: column; overflow-y: auto; z-index: 100;
        }

        h1 { font-size: 20px; font-weight: 900; background: linear-gradient(90deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-align: center; margin-bottom: 20px; }

        .input-group { margin-bottom: 12px; }
        label { font-size: 10px; font-weight: 700; color: var(--primary); text-transform: uppercase; margin-bottom: 5px; display: block; }
        
        input, select {
            width: 100%; padding: 12px; background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px; color: white; font-size: 14px; outline: none; box-sizing: border-box;
        }

        /* Selector de Vehículos */
        .vehicle-selector { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .v-option {
            background: var(--card-bg); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px; border-radius: 10px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .v-option.active { border-color: var(--primary); background: rgba(0, 212, 255, 0.1); transform: scale(1.05); }
        .v-option span { display: block; font-size: 20px; }
        .v-option small { font-size: 9px; font-weight: bold; }

        /* Botones */
        button {
            width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: 800;
            cursor: pointer; transition: 0.3s; text-transform: uppercase; margin-top: 10px;
        }
        .btn-calc { background: linear-gradient(45deg, var(--secondary), var(--primary)); color: white; }
        .btn-ws { background: #25d366; color: white; display: none; font-size: 13px; }
        button:hover { transform: translateY(-2px); filter: brightness(1.1); }

        /* Switch Redondo */
        .switch-container { display: flex; align-items: center; justify-content: space-between; background: var(--card-bg); padding: 10px; border-radius: 8px; margin-bottom: 15px; }

        .results {
            margin-top: 20px; padding: 20px; background: rgba(255,255,255,0.03); border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1); display: none;
        }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 14px; opacity: 0.9; }
        .total-box { font-size: 26px; text-align: center; margin-top: 10px; color: var(--accent); font-weight: 900; }

        #map-container { flex: 1; }
        iframe { width: 100%; height: 100%; border: none; filter: invert(90%) hue-rotate(180deg) brightness(0.9); }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>RUTA AI LOGISTICS</h1>
    
    <div class="input-group">
        <label>📍 Origen</label>
        <input type="text" id="o" list="cities" placeholder="Ciudad de Origen">
    </div>

    <div class="input-group">
        <label>🏁 Destino</label>
        <input type="text" id="d" list="cities" placeholder="Ciudad de Destino">
    </div>

    <label>🚜 Tipo de Vehículo</label>
    <div class="vehicle-selector" id="vehicle-group">
        <div class="v-option" onclick="setVehicle('moto', 25, 0.5, this)">
            <span>🏍️</span><small>MOTO</small>
        </div>
        <div class="v-option active" onclick="setVehicle('auto', 12, 1, this)">
            <span>🚗</span><small>AUTO</small>
        </div>
        <div class="v-option" onclick="setVehicle('heavy', 5, 2.5, this)">
            <span>🚛</span><small>CAMIÓN</small>
        </div>
    </div>

    <div class="switch-container">
        <label style="margin:0">🔄 Viaje Redondo</label>
        <input type="checkbox" id="round-trip" style="width: auto;" onchange="calcular()">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group">
            <label>⛽ Gasolina $/L</label>
            <input type="number" id="p" value="24.50" step="0.1">
        </div>
        <div class="input-group">
            <label>🏎️ Rend KM/L</label>
            <input type="number" id="r" value="12">
        </div>
    </div>

    <button class="btn-calc" onclick="calcular()">Calcular Presupuesto</button>
    
    <div id="res-box" class="results">
        <div class="res-item"><span>Distancia:</span> <span id="dist-txt"></span></div>
        <div class="res-item"><span>Casetas:</span> <span id="toll-txt"></span></div>
        <div class="res-item"><span>Combustible:</span> <span id="fuel-txt"></span></div>
        <div class="total-box" id="total-txt"></div>
        <button class="btn-ws" id="btn-ws" onclick="shareWS()">Enviars Resumen por WhatsApp</button>
    </div>

    <datalist id="cities">
        <option value="Ciudad de México"> <option value="Guadalajara"> <option value="Monterrey">
        <option value="Puebla"> <option value="Querétaro"> <option value="Acapulco">
        <option value="Cancún"> <option value="Toluca"> <option value="Veracruz">
    </datalist>
</div>

<div id="map-container">
    <iframe id="mapa" src="https://maps.google.com/maps?q=Mexico&output=embed"></iframe>
</div>

<script>
    let currentTollMult = 1;
    let lastResult = {};

    const DB_RUTAS = {
        "Ciudad de México-Toluca": { km: 65, caseta: 111 },
        "Ciudad de México-Puebla": { km: 135, caseta: 204 },
        "Ciudad de México-Querétaro": { km: 213, caseta: 216 },
        "Ciudad de México-Acapulco": { km: 380, caseta: 640 },
        "Ciudad de México-Guadalajara": { km: 550, caseta: 1100 },
        "Ciudad de México-Monterrey": { km: 900, caseta: 1500 }
    };

    function setVehicle(type, rend, tollMult, el) {
        document.querySelectorAll('.v-option').forEach(opt => opt.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('r').value = rend;
        currentTollMult = tollMult;
        calcular();
    }

    function calcular() {
        const ori = document.getElementById('o').value.trim();
        const des = document.getElementById('d').value.trim();
        const pre = parseFloat(document.getElementById('p').value);
        const ren = parseFloat(document.getElementById('r').value);
        const isRound = document.getElementById('round-trip').checked;

        if(!ori || !des) return;

        let info = DB_RUTAS[`${ori}-${des}`] || DB_RUTAS[`${des}-${ori}`];
        let km = info ? info.km : Math.floor(Math.abs(ori.length - des.length) * 40 + 120);
        let baseCaseta = info ? info.caseta : Math.floor(km * 1.1);

        // Ajuste por tipo de vehículo y viaje redondo
        let casetaFinal = baseCaseta * currentTollMult;
        if(isRound) { km *= 2; casetaFinal *= 2; }

        const costoFuel = (km / ren) * pre;
        const total = costoFuel + casetaFinal;

        lastResult = { ori, des, km, casetaFinal, costoFuel, total, isRound };

        // UI Update
        document.getElementById('res-box').style.display = 'block';
        document.getElementById('dist-txt').innerText = `${km} KM`;
        document.getElementById('toll-txt').innerText = `$${casetaFinal.toFixed(2)}`;
        document.getElementById('fuel-txt').innerText = `$${costoFuel.toFixed(2)}`;
        document.getElementById('total-txt').innerText = `TOTAL: $${total.toFixed(2)}`;
        document.getElementById('btn-ws').style.display = 'block';

        document.getElementById('mapa').src = `https://www.google.com/maps?q=${encodeURIComponent(ori)}+to+${encodeURIComponent(des)}&output=embed`;
    }

    function shareWS() {
        const msg = `🚀 *RESUMEN DE VIAJE PRO*\n\n` +
                    `📍 *Origen:* ${lastResult.ori}\n` +
                    `🏁 *Destino:* ${lastResult.des}\n` +
                    `📏 *Distancia:* ${lastResult.km} KM ${lastResult.isRound ? '(Redondo)' : ''}\n` +
                    `⛽ *Combustible:* $${lastResult.costoFuel.toFixed(2)}\n` +
                    `🛣️ *Casetas:* $${lastResult.casetaFinal.toFixed(2)}\n\n` +
                    `💰 *TOTAL ESTIMADO:* $${lastResult.total.toFixed(2)}\n\n` +
                    `_Calculado con Rutas AI Master_`;
        
        const url = `https://wa.me/?text=${encodeURIComponent(msg)}`;
        window.open(url, '_blank');
    }
</script>

</body>
</html>
