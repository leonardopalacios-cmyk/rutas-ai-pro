<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🚀 RUTAS AI PRO - FINAL</title>
    <style>
        :root { --p: #00d4ff; --s: #e94560; --bg: #0a0a12; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; display: flex; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 360px; background: #16213e; padding: 25px; border-right: 1px solid #1f4068; display: flex; flex-direction: column; box-shadow: 10px 0 30px rgba(0,0,0,0.5); z-index: 10; }
        h1 { color: var(--s); text-align: center; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 30px; }
        
        label { display: block; font-size: 11px; color: var(--p); font-weight: bold; margin-top: 15px; text-transform: uppercase; }
        input { width: 100%; padding: 12px; margin-top: 5px; border-radius: 8px; border: 1px solid #1f4068; background: var(--bg); color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: var(--p); }

        button { width: 100%; padding: 15px; margin-top: 30px; background: var(--s); color: white; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; box-shadow: 0 4px 15px rgba(233, 69, 96, 0.4); }
        button:hover { background: #ff5e78; transform: scale(1.02); }

        .results { margin-top: 25px; padding: 15px; background: rgba(0, 212, 255, 0.05); border-radius: 12px; border: 1px dashed var(--p); display: none; animation: slideIn 0.4s; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .val { font-size: 20px; font-weight: bold; color: #2ecc71; margin-top: 5px; }
        
        #map-container { flex: 1; position: relative; background: #000; }
        iframe { width: 100%; height: 100%; border: none; filter: hue-rotate(-15deg) brightness(0.8); }
    </style>
</head>
<body>

<div class="sidebar">
    <h1>RUTA AI PRO</h1>
    
    <label>📍 Origen</label>
    <input type="text" id="o" list="cities" placeholder="Ej: Ciudad de México">

    <label>🏁 Destino</label>
    <input type="text" id="d" list="cities" placeholder="Ej: Toluca">

    <datalist id="cities">
        <option value="Ciudad de México">
        <option value="Toluca">
        <option value="Querétaro">
        <option value="Puebla">
        <option value="Guadalajara">
        <option value="Monterrey">
        <option value="Cuernavaca">
    </datalist>

    <label>⛽ Precio Gas ($/L)</label>
    <input type="number" id="p" value="24.50" step="0.01">

    <label>🏎️ Rendimiento (KM/L)</label>
    <input type="number" id="r" value="12">

    <button onclick="analizar()">ANALIZAR TRAYECTO</button>

    <div id="res-box" class="results">
        <span style="color:var(--p); font-size: 12px; font-weight: bold;">COSTO ESTIMADO</span>
        <div id="costo-final" class="val"></div>
        <div id="dist-final" style="font-size: 14px; margin-top: 5px; color: #888;"></div>
    </div>
</div>

<div id="map-container">
    <iframe id="mapa" src="https://maps.google.com/maps?q=Mexico&t=m&z=5&output=embed"></iframe>
</div>

<script>
    function analizar() {
        const origen = document.getElementById('o').value;
        const destino = document.getElementById('d').value;
        const precio = parseFloat(document.getElementById('p').value);
        const rendi = parseFloat(document.getElementById('r').value);

        if(!origen || !destino) return alert("Por favor ingresa origen y destino");

        // Simulación de distancia lógica (puedes ajustarla)
        const dist = Math.floor(Math.random() * (180 - 40) + 40);
        const costo = (dist / rendi) * precio;

        // Actualizar Mapa con ruta visual
        document.getElementById('mapa').src = `https://www.google.com/maps?q=${encodeURIComponent(origen)}+to+${encodeURIComponent(destino)}&output=embed&t=m`;

        // Mostrar resultados
        document.getElementById('res-box').style.display = 'block';
        document.getElementById('costo-final').innerText = "$" + costo.toFixed(2);
        document.getElementById('dist-final').innerText = "📏 Recorrido: " + dist + " KM";
    }
</script>

</body>
</html>
