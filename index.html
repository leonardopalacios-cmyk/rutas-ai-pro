<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>🚀 RUTAS AI PRO - FINAL</title>
    <style>
        body { font-family: sans-serif; background: #0a0a12; color: white; padding: 20px; display: flex; justify-content: center; }
        .panel { background: #16213e; padding: 20px; border-radius: 15px; width: 350px; border: 1px solid #00d4ff; }
        h2 { color: #e94560; text-align: center; }
        input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; background: #00d4ff; }
        .ruta-card { background: #1b1b2f; padding: 10px; margin-top: 10px; border-radius: 8px; border-left: 4px solid #e94560; }
    </style>
</head>
<body>

    <div class="panel">
        <h2>🚗 RUTA AI PRO</h2>
        
        <label>📍 Origen:</label>
        <input type="text" id="origen" list="ciudadesLista" placeholder="Escribe ciudad...">
        
        <label>🏁 Destino:</label>
        <input type="text" id="destino" list="ciudadesLista" placeholder="Escribe ciudad...">

        <!-- ESTO ES EL AUTOCOMPLETADO -->
        <datalist id="ciudadesLista">
            <option value="Ciudad de México">
            <option value="Toluca">
            <option value="Puebla">
            <option value="Querétaro">
            <option value="Guadalajara">
            <option value="Monterrey">
            <option value="Cuernavaca">
        </datalist>

        <label>⛽ Precio Gas ($):</label>
        <input type="number" id="precio" value="24">

        <label>🏎‍🟀 Rendimiento (KM/L):</label>
        <input type="number" id="km_litro" value="12">

        <button onclick="calcular()">CALCULAR AHORA</button>
        
        <div id="resultado"></div>
    </div>

    <script>
        function calcular() {
            var ori = document.getElementById("origen").value;
            var des = document.getElementById("destino").value;
            var precio = parseFloat(document.getElementById("precio").value);
            var rendi = parseFloat(document.getElementById("km_litro").value);

            if(!ori || !des) return alert("Pon origen y destino");

            // Simulamos distancia realista
            var distancia = Math.floor(Math.random() * 80) + 10;
            
            // FÓRMULA SOLICITADA POR EL MAESTRO:
            // (Distancia / Rendimiento) * Precio
            var gasto = (distancia / rendi) * precio;

            var lista = document.getElementById("resultado");
            lista.innerHTML = `
                <div class="ruta-card">
                    <b>${ori} a ${des}</b><br>
                    📏 Distancia: ${distancia} km<br>
                    <b style="color:#2ecc71">💰 Gasto Total: $${gasto.toFixed(2)}</b>
                </div>` + lista.innerHTML;
        }
    </script>
</body>
</html>
